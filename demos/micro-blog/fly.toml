app = "ori-micro-blog"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  ORI_HOST = "0.0.0.0"
  PORT = "8080"
  ORI_ENV = "production"
  MICROBLOG_DB = "/data/microblog.db"
  MICROBLOG_SESSION_DB = "/data/microblog_sessions.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine so the SQLite volume stays warm enough for demos
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "60s"
    interval = "10s"
    timeout = "5s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[mounts]
  source = "microblog_data"
  destination = "/data"
