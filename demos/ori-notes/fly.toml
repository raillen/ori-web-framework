# fly.toml — Ori Notes
# Health checks need a process that binds 0.0.0.0:$PORT quickly.
# Deploy: ori compile main.orl -o ori-notes && fly deploy -a ori-notes

app = "ori-notes"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  ORI_HOST = "0.0.0.0"
  PORT = "8080"
  ORI_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # Generous grace: cold start + first accept on free shared CPU
  [[http_service.checks]]
    grace_period = "60s"
    interval = "10s"
    timeout = "5s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
