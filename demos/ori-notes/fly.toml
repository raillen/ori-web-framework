# fly.toml — Ori Notes demo
# https://fly.io/docs/reference/configuration/

app = "ori-notes"          # change if the name is taken
primary_region = "gru"     # São Paulo; change as needed

[build]
  dockerfile = "Dockerfile"

[env]
  ORI_HOST = "0.0.0.0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
