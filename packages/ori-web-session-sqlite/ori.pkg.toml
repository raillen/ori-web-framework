[package]
name = "web_session_sqlite"
version = "0.1.0"
entry = "src/lib.orl"
ori_version = "0.3.0"
description = "SQLite session store adapter for ori-web (B3) via use_custom_sessions"

# sqlite: relative symlink packages/ori-sqlite → ori-sqlite repo (or set path in app).
# Override with ORI_SQLITE_ROOT when running tools/qa/web_session_sqlite_smoke.sh.
[dependencies]
web = { path = "../ori-web", version = "0.1.0" }
sqlite = { path = "../ori-sqlite", version = "0.3.0" }
